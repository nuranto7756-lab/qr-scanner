<!DOCTYPE html>
<html>
<head>
    <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body style="margin:0; padding:0; overflow:hidden; background:black;">
    <div id="reader" style="width: 100%; height: 100vh;"></div>
    <script>
const html5QrCode = new Html5Qrcode("reader");
const config = { fps: 10, qrbox: { width: 250, height: 250 } };

html5QrCode.start({ facingMode: "environment" }, config, (decodedText) => {
    // KIRIM DATA KE JENDELA INDUK (Apps Script)
    if (window.opener) {
        window.opener.postMessage({ type: 'QR_SCANNED', code: decodedText }, '*');
        
        // BERHENTI & TUTUP JENDELA OTOMATIS
        html5QrCode.stop().then(() => {
            window.close(); 
        });
    } else {
        // Jika dibuka langsung tanpa pop-up
        alert("Kode QR: " + decodedText);
    }
});
        }

        // Tunggu sinyal dari Apps Script baru nyalakan kamera
        window.onmessage = function(e) {
            if (e.data.type === 'START_SCAN') {
                jalankanKamera();
            }
        };
    </script>
</body>
</html>
